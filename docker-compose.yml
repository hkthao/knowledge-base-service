services:

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme-please}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  kb-indexer:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme-please}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - ROSLYN_URL=http://roslyn-service:5000
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
    volumes:
      - ./repos:/repos
      - ./documents:/documents
      - ./data:/app/data
    depends_on:
      - neo4j
      - qdrant
      - ollama
      - roslyn-service

  roslyn-service:
    build: ./roslyn-service
    ports:
      - "5000:5000"
    volumes:
      # Mount repos at the same path Python sees so file_path matches.
      - ./repos:/repos
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_RUNNING_IN_CONTAINER=true
      - INTERNAL_NS_PREFIXES=${INTERNAL_NS_PREFIXES:-}
    deploy:
      resources:
        limits:
          memory: 2G

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme-nextauth}
      - SALT=${LANGFUSE_SALT:-changeme-salt}
      - TELEMETRY_ENABLED=false
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  qdrant_data:
  ollama_data:
  langfuse_db_data:
