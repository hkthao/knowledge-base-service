services:

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme-please}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  kb-indexer:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme-please}
      - QDRANT_URL=http://qdrant:6333
      # Ollama chạy trên host (không trong compose). host.docker.internal
      # work trên Docker Desktop (Mac/Win) và Linux Docker 20.10+ với
      # extra_hosts ở dưới.
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - ROSLYN_URL=http://roslyn-service:5000
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
    volumes:
      - ./repos:/repos
      - ./documents:/documents
      - ./data:/app/data
    extra_hosts:
      # Cần cho Linux để host.docker.internal resolve về host. Mac/Win
      # Docker Desktop tự cấp DNS này, dòng này thừa nhưng vô hại.
      - "host.docker.internal:host-gateway"
    depends_on:
      - neo4j
      - qdrant
      - roslyn-service

  roslyn-service:
    build: ./roslyn-service
    ports:
      # Host 5050 — port 5000 đụng macOS AirPlay Receiver. Trong network
      # docker, container vẫn nói chuyện qua port 5000 (không đổi).
      - "5050:5000"
    volumes:
      # Hai mount cho cùng dữ liệu:
      #  - /repos: dùng khi kb-indexer cũng chạy trong docker
      #  - ${PWD}/repos: dùng khi kb-indexer chạy local — host abs path
      #    của file phải resolve được trong container thì Roslyn mới
      #    OpenProject + ReadAllText được.
      - ./repos:/repos
      - ${PWD}/repos:${PWD}/repos
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_RUNNING_IN_CONTAINER=true
      - INTERNAL_NS_PREFIXES=${INTERNAL_NS_PREFIXES:-}
    deploy:
      resources:
        limits:
          memory: 2G

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme-nextauth}
      - SALT=${LANGFUSE_SALT:-changeme-salt}
      - TELEMETRY_ENABLED=false
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  qdrant_data:
  langfuse_db_data:
